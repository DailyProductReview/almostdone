<!-- Angepasster Code mit den neuen Texten -->
<div class="email-section">
    <h3>Enter Your Email To Access Your Account</h3>
    <input type="email" placeholder="Your email address" id="emailInput">
    <button onclick="handleEmailSubmit()">Confirm My Email</button> 
</div>

<script>
function handleEmailSubmit() {
    const email = document.getElementById('emailInput').value;
    if (email && email.includes('@')) {
        // Hier kommt die Logik für die Email-Bestätigung
        console.log('Email confirmed:', email);
        alert(`Confirmation email sent to ${email}`);
    } else {
        alert('Please enter a valid email address');
    }
}
</script>

<style>
.email-section {
    text-align: center;
    padding: 20px;
    background: #f5f5f5;
    border-radius: 8px;
    max-width: 400px;
    margin: 20px auto;
}

.email-section h3 {
    margin-bottom: 15px;
    color: #333;
}

.email-section input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
}

    background: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
}

.email-section button:hover {
    background: #0056b3;
}
</style>
